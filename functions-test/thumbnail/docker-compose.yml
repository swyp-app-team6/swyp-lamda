name: thumbnail-bench

services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=ap-northeast-2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  lambda-stream:
    build:
      context: .
      dockerfile: Dockerfile.stream
    ports:
      - "9000:8080"
    environment:
      - S3_ENDPOINT=http://localstack:4566
      - AWS_REGION=ap-northeast-2
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - WEBP_QUALITY=90
    depends_on:
      localstack:
        condition: service_healthy

  lambda-buffer:
    build:
      context: .
      dockerfile: Dockerfile.buffer
    ports:
      - "9001:8080"
    environment:
      - S3_ENDPOINT=http://localstack:4566
      - AWS_REGION=ap-northeast-2
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - WEBP_QUALITY=90
    depends_on:
      localstack:
        condition: service_healthy

  lambda-buffer-concurrent:
    build:
      context: .
      dockerfile: Dockerfile.buffer-concurrent
    ports:
      - "9002:8080"
    environment:
      - S3_ENDPOINT=http://localstack:4566
      - AWS_REGION=ap-northeast-2
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - WEBP_QUALITY=90
    depends_on:
      localstack:
        condition: service_healthy
